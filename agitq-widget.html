<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="아기티큐">
<meta name="theme-color" content="#000000">
<title>아기티큐 위젯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #000000;
    --p1:           #FFFFFF;
    --p2:           #AAAAAA;
    --dot:          #666666;
    --divider:      #333333;
    --tqqq:         #e8714f;
    --spym:         #b07cc0;
    --sgov:         #5bb8e8;
    --ma:           #afd485;
    --cp:           #80dfff;
    --extreme-fear: #e8714f;
    --fear:         #f0a0a0;
    --neutral:      #AAAAAA;
    --greed:        #5bb8e8;
    --extreme-greed:#b07cc0;
    --card-bg:      #0a0a0a;
    --border:       #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--p1);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100dvh;
    padding: 16px 16px 32px;
    overscroll-behavior: none;
  }

  /* ── 풀스크린 스플래시 ── */
  #splash {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    z-index: 999;
    transition: opacity 0.5s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  .splash-logo {
    font-size: 32px; font-weight: 700;
    letter-spacing: -0.5px;
  }
  .splash-logo span { color: var(--tqqq); }
  .splash-sub { color: var(--p2); font-size: 13px; font-family: 'DM Mono', monospace; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid #222;
    border-top-color: var(--cp);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 헤더 ── */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .app-title { font-size: 13px; color: var(--p2); font-family: 'DM Mono', monospace; }
  .refresh-btn {
    background: none; border: 1px solid var(--border);
    color: var(--p2); font-size: 11px;
    padding: 5px 10px; border-radius: 6px;
    cursor: pointer; font-family: 'DM Mono', monospace;
    transition: border-color 0.2s, color 0.2s;
  }
  .refresh-btn:active { border-color: var(--cp); color: var(--cp); }
  .refresh-btn.spinning { animation: spin 0.8s linear infinite; }

  /* ── 카드 ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 16px 14px;
    margin-bottom: 12px;
    animation: fadeUp 0.5s ease both;
  }
  .card:nth-child(2) { animation-delay: 0.1s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 카드 헤더 ── */
  .card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 4px;
  }
  .card-title { font-size: 16px; font-weight: 700; color: var(--p1); }
  .card-ver   { font-size: 8px; color: var(--p2); font-family: 'DM Mono', monospace; margin-top: 3px; }
  .card-date  { font-size: 10px; color: var(--p2); margin-bottom: 10px; font-family: 'DM Mono', monospace; }
  .card-badge {
    font-size: 8px; color: var(--p2); font-family: 'DM Mono', monospace;
    margin-top: 3px;
  }

  /* ── 200일선 카드 바디 ── */
  .ma-body {
    display: flex; gap: 12px; align-items: center;
  }
  .ma-chart-wrap {
    flex-shrink: 0;
    width: 155px; height: 95px;
  }
  .ma-chart-wrap canvas { width: 100%; height: 100%; }

  .ma-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }

  .signal-lines { display: flex; flex-direction: column; gap: 1px; margin-bottom: 6px; }
  .signal-line  { display: flex; flex-wrap: wrap; gap: 0; font-weight: 700; font-size: 15px; line-height: 1.5; }

  .t-tqqq  { color: var(--tqqq); }
  .t-spym  { color: var(--spym); }
  .t-sgov  { color: var(--sgov); }
  .t-dot   { color: var(--dot); }
  .t-slash { color: var(--p1); }
  .t-gray  { color: var(--p2); }
  .t-white { color: var(--p1); }

  .status-row { font-size: 11px; color: var(--p2); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
  .price-row  { display: flex; align-items: baseline; gap: 3px; }
  .price-cp   { font-size: 13px; font-weight: 500; color: var(--cp); font-family: 'DM Mono', monospace; }
  .price-ma   { font-size: 13px; font-weight: 500; color: var(--ma); font-family: 'DM Mono', monospace; }
  .price-sl   { font-size: 15px; font-weight: 700; color: var(--p1); font-family: 'DM Mono', monospace; }

  /* ── FGI 카드 바디 ── */
  .fgi-body { display: flex; gap: 12px; align-items: center; }
  .fgi-chart-wrap { flex-shrink: 0; width: 148px; height: 95px; }
  .fgi-chart-wrap canvas { width: 100%; height: 100%; }

  .fgi-info { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .gauge-wrap { width: 155px; height: 75px; }
  .gauge-wrap canvas { width: 100%; height: 100%; }

  .fgi-rating { font-size: 14px; font-weight: 700; text-align: center; }
  .fgi-num-row { display: flex; align-items: baseline; gap: 3px; font-family: 'DM Mono', monospace; }
  .fgi-now  { font-size: 13px; font-weight: 500; }
  .fgi-avg  { font-size: 13px; font-weight: 500; }
  .fgi-sl   { font-size: 15px; font-weight: 700; color: var(--p1); }

  /* ── 에러 / 로딩 ── */
  .err-msg { color: orange; font-size: 12px; font-weight: 700; padding: 12px 0; }

  /* ── 설치 배너 ── */
  #install-banner {
    display: none;
    background: #111; border: 1px solid #2a2a2a;
    border-radius: 12px; padding: 12px 14px;
    margin-bottom: 12px;
    flex-direction: column; gap: 8px;
    animation: fadeUp 0.4s ease both;
  }
  #install-banner.show { display: flex; }
  .install-text { font-size: 13px; color: var(--p2); }
  .install-text strong { color: var(--p1); }
  .install-btns { display: flex; gap: 8px; }
  .install-btn {
    flex: 1; padding: 8px;
    border-radius: 8px; border: none;
    font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .install-btn.primary { background: var(--cp); color: #000; }
  .install-btn.dismiss { background: #1e1e1e; color: var(--p2); }

  /* ── 푸터 ── */
  .footer {
    text-align: center; color: #333; font-size: 10px;
    font-family: 'DM Mono', monospace; margin-top: 8px;
  }
  .footer a { color: #444; text-decoration: none; }
</style>

<script>
// ── 색상 팔레트 ──────────────────────────────────────────────
const C = {
  bg:           '#000000',
  p1:           '#FFFFFF',
  p2:           '#AAAAAA',
  dot:          '#666666',
  divider:      '#333333',
  tqqq:         '#e8714f',
  spym:         '#b07cc0',
  sgov:         '#5bb8e8',
  ma:           '#afd485',
  cp:           '#80dfff',
  extremeFear:  '#e8714f',
  fear:         '#f0a0a0',
  neutral:      '#AAAAAA',
  greed:        '#5bb8e8',
  extremeGreed: '#b07cc0',
};

const MA_API  = 'https://query1.finance.yahoo.com/v8/finance/chart/TQQQ?range=500d&interval=1d';
const FGI_API = 'https://production.dataviz.cnn.io/index/fearandgreed/graphdata';
const YT_URL  = 'https://www.youtube.com/@아기티큐';

// CORS 프록시 목록 (순서대로 시도)
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function fetchWithProxy(apiUrl) {
  // allorigins는 contents 래핑, 나머지는 직접 JSON
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const proxyUrl = PROXIES[i](apiUrl);
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const text = await res.text();
      // allorigins: {"contents":"..."}
      try {
        const wrapped = JSON.parse(text);
        if (wrapped.contents) return JSON.parse(wrapped.contents);
        return wrapped;
      } catch {
        return JSON.parse(text);
      }
    } catch (e) {
      console.warn(`Proxy ${i} failed:`, e.message);
    }
  }
  throw new Error('All proxies failed');
}

// ── 공통 유틸 ────────────────────────────────────────────────
function fgiColor(val) {
  if (val >= 75) return C.extremeGreed;
  if (val >= 55) return C.greed;
  if (val >= 45) return C.neutral;
  if (val >= 25) return C.fear;
  return C.extremeFear;
}

function translateRating(r) {
  switch ((r || '').toLowerCase()) {
    case 'extreme fear':  return '극공포 (Extreme Fear)';
    case 'fear':          return '공포 (Fear)';
    case 'neutral':       return '중립 (Neutral)';
    case 'greed':         return '탐욕 (Greed)';
    case 'extreme greed': return '극탐욕 (Extreme Greed)';
    default: return r;
  }
}

function getMA(data, p) {
  const ma = new Array(data.length).fill(NaN);
  for (let i = p - 1; i < data.length; i++) {
    let sum = 0;
    for (let j = 0; j < p; j++) sum += data[i - j];
    ma[i] = sum / p;
  }
  return ma;
}

function getSignal(c, m) {
  const len = c.length;
  const currP = c[len-1], prevP = c[len-2], p2P = c[len-3], p3P = c[len-4];
  const currM = m[len-1], prevM = m[len-2], p2M = m[len-3], p3M = m[len-4];

  if (currP < currM) return {
    n: '200일선 아래',
    lines: [['TQQQ·SPYM', '매도'], ['SGOV', '매수']],
  };
  if (currP >= currM && prevP < prevM) return {
    n: '200일선 위 1일 차',
    lines: [['이틀', '더'], ['기다리기']],
  };
  if (currP >= currM && prevP >= prevM && p2P < p2M) return {
    n: '200일선 위 2일 차',
    lines: [['하루만', '더'], ['기다리기']],
  };
  if (!isNaN(p3M) && currP >= currM && prevP >= prevM && p2P >= p2M && p3P < p3M) return {
    n: '200일선 위 3일 차',
    lines: [['SGOV', '매도'], ['TQQQ', '매수']],
  };
  return {
    n: '200일선 위',
    lines: [['TQQQ', '유지'], ['SPYM·SGOV', '반반'], ['여유현금', '추가매수']],
  };
}

// ── 200일선 캔버스 차트 ──────────────────────────────────────
function drawMAChart(closes, ma) {
  const canvas = document.getElementById('maCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const SIZE = 90;
  const pSet = closes.slice(-SIZE);
  const mSet = ma.slice(-SIZE);
  const all = [...pSet, ...mSet].filter(v => !isNaN(v));
  const min = Math.min(...all), max = Math.max(...all);
  const range = (max - min) === 0 ? 1 : (max - min);
  const PAD = 10;

  const tx = (i) => PAD + (i / (SIZE - 1)) * (W - PAD * 2);
  const ty = (v) => (H - PAD) - ((v - min) / range) * (H - PAD * 2);

  const drawLine = (data, color, lw) => {
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    let started = false;
    data.forEach((v, i) => {
      if (isNaN(v)) return;
      if (!started) { ctx.moveTo(tx(i), ty(v)); started = true; }
      else ctx.lineTo(tx(i), ty(v));
    });
    ctx.stroke();
  };

  drawLine(mSet, C.ma, 2.5);
  drawLine(pSet, C.cp, 3);
}

// ── FGI 꺾은선 차트 ──────────────────────────────────────────
function drawFGIChart(data) {
  const canvas = document.getElementById('fgiCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const PAD_L = 6, PAD_R = 6, PAD_T = 10, PAD_B = 10;
  const usableW = W - PAD_L - PAD_R;
  const usableH = H - PAD_T - PAD_B;
  const toX = (i) => PAD_L + (i / (data.length - 1)) * usableW;
  const toY = (v) => PAD_T + (1 - v / 100) * usableH;

  // 격자선
  [25, 50, 75].forEach(level => {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(170,170,170,0.15)';
    ctx.lineWidth = 1;
    ctx.moveTo(PAD_L, toY(level));
    ctx.lineTo(W - PAD_R, toY(level));
    ctx.stroke();
  });

  // 꺾은선
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  data.forEach((d, i) => {
    const x = toX(i), y = toY(parseFloat(d.y));
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // 색상 점
  data.forEach((d, i) => {
    const x = toX(i), y = toY(parseFloat(d.y));
    ctx.beginPath();
    ctx.fillStyle = fgiColor(parseFloat(d.y));
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ── 게이지 ───────────────────────────────────────────────────
function drawGauge(val) {
  const canvas = document.getElementById('gaugeCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H - 14, radius = 88, thick = 10;

  // 그라데이션 아크
  for (let i = 0; i < 150; i++) {
    const t = i / 149;
    const angle = Math.PI + t * Math.PI;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    ctx.beginPath();
    ctx.fillStyle = fgiColor(t * 100);
    ctx.arc(x, y, thick / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // 바늘
  const needleAngle = Math.PI + (val / 100) * Math.PI;
  const needleLen = radius - 6;
  for (let i = 0; i < 40; i++) {
    const t = i / 39;
    const nx = cx + Math.cos(needleAngle) * needleLen * t;
    const ny = cy + Math.sin(needleAngle) * needleLen * t;
    const th = 10 * (1 - t);
    ctx.beginPath();
    ctx.fillStyle = '#FFFFFF';
    ctx.arc(nx, ny, th / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // 중심점
  ctx.beginPath();
  ctx.fillStyle = '#FFFFFF';
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fill();
}

// ── 신호 HTML 생성 ───────────────────────────────────────────
const ETF_COLORS = { TQQQ: 't-tqqq', SPYM: 't-spym', SGOV: 't-sgov' };

function tokenHTML(token) {
  if (token.includes('·')) {
    return token.split('·').map((part, i, arr) => {
      const cls = ETF_COLORS[part] || 't-white';
      return `<span class="${cls}">${part}</span>` +
             (i < arr.length - 1 ? `<span class="t-dot">·</span>` : '');
    }).join('') + `<span class="t-white">&nbsp;</span>`;
  }
  const cls = ETF_COLORS[token] || 't-white';
  return `<span class="${cls}">${token}&nbsp;</span>`;
}

function signalHTML(sig) {
  return sig.lines.map(words =>
    `<div class="signal-line">${words.map(tokenHTML).join('')}</div>`
  ).join('');
}

// ── Yahoo Finance 데이터 fetch ────────────────────────────────
async function fetchMA() {
  try {
    const json = await fetchWithProxy(MA_API);
    const result = json.chart.result[0];
    const closes = result.indicators.quote[0].close.filter(v => v != null && v > 0);
    const meta = result.meta;
    closes[closes.length - 1] = meta.regularMarketPrice;
    return { closes, mTime: meta.regularMarketTime, cp: meta.regularMarketPrice };
  } catch (e) {
    console.error('MA fetch failed', e);
    return null;
  }
}

// ── CNN FGI 데이터 fetch ──────────────────────────────────────
async function fetchFGI() {
  try {
    const json = await fetchWithProxy(FGI_API);
    return json.fear_and_greed_historical.data.slice(-90);
  } catch (e) {
    console.error('FGI fetch failed', e);
    return null;
  }
}

// ── 날짜 포맷 ────────────────────────────────────────────────
function fmtDate(ts, suffix) {
  const d = new Date(ts);
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yy}.${mm}.${dd}. ${suffix}`;
}

// ── 200일선 카드 렌더 ────────────────────────────────────────
function renderMA(maData) {
  if (!maData) {
    document.getElementById('maDate').textContent = '데이터 통신 지연';
    document.getElementById('maInfo').innerHTML = '<div class="err-msg">⚠️ 잠시 후 새로고침하세요.</div>';
    return;
  }

  const ma = getMA(maData.closes, 200);
  const sig = getSignal(maData.closes, ma);
  const maVal = ma[ma.length - 1];
  const gap = ((maData.cp - maVal) / maVal) * 100;
  const gapStr = (gap >= 0 ? '+' : '') + gap.toFixed(2) + '%';

  document.getElementById('maDate').textContent = fmtDate(maData.mTime * 1000, '종가 기준');

  drawMAChart(maData.closes, ma);

  document.getElementById('maInfo').innerHTML = `
    <div class="signal-lines">${signalHTML(sig)}</div>
    <div class="status-row">${sig.n} (${gapStr})</div>
    <div class="price-row">
      <span class="price-cp">$${maData.cp.toFixed(2)}</span>
      <span class="price-sl"> / </span>
      <span class="price-ma">$${maVal.toFixed(2)}</span>
    </div>
  `;
}

// ── FGI 카드 렌더 ────────────────────────────────────────────
function renderFGI(fgiData) {
  if (!fgiData || fgiData.length === 0) {
    document.getElementById('fgiDate').textContent = '데이터 통신 지연';
    document.getElementById('fgiInfo').innerHTML = '<div class="err-msg">⚠️ 잠시 후 새로고침하세요.</div>';
    return;
  }

  const latest = fgiData[fgiData.length - 1];
  const latestVal = parseFloat(latest.y);
  const latestCol = fgiColor(latestVal);
  const month30 = fgiData.slice(-30);
  const avg30 = month30.reduce((s, d) => s + parseFloat(d.y), 0) / month30.length;
  const avgCol = fgiColor(avg30);

  document.getElementById('fgiDate').textContent = fmtDate(latest.x, 'CNN 업데이트 기준');

  drawFGIChart(fgiData);
  drawGauge(latestVal);

  document.getElementById('fgiInfo').innerHTML = `
    <div class="gauge-wrap"><canvas id="gaugeCanvas" width="310" height="150"></canvas></div>
    <div class="fgi-rating" style="color:${latestCol}">${translateRating(latest.rating.toString())}</div>
    <div class="fgi-num-row">
      <span class="fgi-now" style="color:${latestCol}">현재 ${latestVal.toFixed(0)}</span>
      <span class="fgi-sl"> / </span>
      <span class="fgi-avg" style="color:${avgCol}">30일 평균 ${avg30.toFixed(0)}</span>
    </div>
  `;

  // gauge canvas가 새로 생겼으므로 다시 그리기
  drawGauge(latestVal);
}

// ── 전체 로드 ────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.disabled = true;

  const [maData, fgiData] = await Promise.all([fetchMA(), fetchFGI()]);

  renderMA(maData);
  renderFGI(fgiData);

  btn.classList.remove('spinning');
  btn.disabled = false;

  // 스플래시 숨기기
  const splash = document.getElementById('splash');
  if (splash && !splash.classList.contains('hide')) {
    splash.classList.add('hide');
    setTimeout(() => splash.remove(), 600);
  }
}

// ── PWA 설치 배너 ─────────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    dismissBanner();
  }
});

function dismissBanner() {
  document.getElementById('install-banner').classList.remove('show');
}

// ── 서비스 워커 등록 (오프라인 캐시) ─────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
    const CACHE = 'agitq-v1';
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE)));
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('finance.yahoo') || e.request.url.includes('cnn.io')) return;
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `)).catch(() => {});
}

// ── 앱 시작 ──────────────────────────────────────────────────
loadAll();

// 5분마다 자동 갱신
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
